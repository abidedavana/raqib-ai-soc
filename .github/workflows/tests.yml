name: Tests

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  gateway-tests:
    name: Gateway unit + integration tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: gateway
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: gateway/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Validate signature rules (detection-as-code)
        run: |
          python -c "from app.detection.signatures import SignatureEngine; e=SignatureEngine(); assert e.rule_count>=8, 'expected >=8 rules'; print(f'OK: {e.rule_count} signature rules compiled')"

      - name: Run test suite
        run: pytest -q

  red-team:
    name: Red-team harness (measured detection / FP)
    runs-on: ubuntu-latest
    needs: gateway-tests
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: gateway/requirements.txt

      - name: Install dependencies
        run: pip install -r gateway/requirements.txt

      - name: Run red-team harness (regression gate on measured baseline)
        # Baseline (heuristic-fallback judge, no Ollama): ~77% detection, ~10% FP.
        # Gate with margin so the build fails only on a real regression.
        run: python redteam/run_harness.py --min-detection-rate 0.70 --max-fp-rate 0.20
